<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索台灣 - 你的專屬導遊</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #059669;
            --secondary: #0284c7;
            --accent: #f43f5e;
            --bg: #f8fafc;
        }

        body {
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: #1e293b;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header-bg {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            height: 220px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 0;
        }

        .swiper {
            width: 100%;
            padding-top: 20px;
            padding-bottom: 40px;
        }

        .swiper-slide {
            width: 280px;
            height: 380px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            font-size: 26px;
            color: white;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .icon-box:active {
            transform: scale(0.9);
        }

        .modal-active {
            overflow: hidden;
        }

        .btn-close {
            background: #f1f5f9;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body class="bg-slate-50">
    <div class="header-bg"></div>
    <div class="relative z-10 px-6 pt-8 flex justify-between items-center text-white">
        <div>
            <div id="datetime-display" class="text-[10px] font-bold opacity-80 tracking-widest uppercase">Taipei, 00:00
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">探索台灣</h1>
        </div>
        <div id="weather-status"
            class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-2xl flex items-center gap-2 text-xs font-bold border border-white/20">
            <i class="ph ph-sun text-lg"></i>
            <span>26°C 晴朗</span>
        </div>
    </div>

    <div class="relative z-10 mt-6 px-4">
        <div class="swiper main-swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide" onclick="openAttraction('taipei101')">
                    <img src="taipei101.png" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                    <div class="absolute bottom-6 left-6 right-6 text-white">
                        <span class="bg-rose-500 text-[10px] font-extrabold px-2 py-1 rounded-full uppercase">Must
                            Visit</span>
                        <h3 class="text-xl font-extrabold mt-2">台北 101</h3>
                    </div>
                </div>
                <div class="swiper-slide" onclick="openAttraction('taroko')">
                    <img src="taroko.png" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                    <div class="absolute bottom-6 left-6 right-6 text-white">
                        <span
                            class="bg-emerald-500 text-[10px] font-extrabold px-2 py-1 rounded-full uppercase">Nature</span>
                        <h3 class="text-xl font-extrabold mt-2">太魯閣國家公園</h3>
                    </div>
                </div>
                <div class="swiper-slide" onclick="openAttraction('jiufen')">
                    <img src="jiufen.png" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                    <div class="absolute bottom-6 left-6 right-6 text-white">
                        <span
                            class="bg-amber-500 text-[10px] font-extrabold px-2 py-1 rounded-full uppercase">Culture</span>
                        <h3 class="text-xl font-extrabold mt-2">九份金山老街</h3>
                    </div>
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="bg-white rounded-[40px] shadow-2xl shadow-slate-200/50 p-8 -mt-6 relative z-20 mb-32">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-extrabold text-slate-800">深度探索</h2>
            </div>
            <div class="nav-grid">
                <div class="nav-item" onclick="openModal('airportModal')">
                    <div class="icon-box bg-blue-500"><i class="ph ph-airplane"></i></div>
                    <p class="text-[11px] font-extrabold text-slate-600 mt-2">機場交通</p>
                </div>
                <div class="nav-item" onclick="openModal('mrtModal')">
                    <div class="icon-box bg-emerald-500"><i class="ph ph-train"></i></div>
                    <p class="text-[11px] font-extrabold text-slate-600 mt-2">捷運指南</p>
                </div>
                <div class="nav-item" onclick="openModal('intercityModal')">
                    <div class="icon-box bg-indigo-500"><i class="ph ph-path"></i></div>
                    <p class="text-[11px] font-extrabold text-slate-600 mt-2">高鐵台鐵</p>
                </div>
                <div class="nav-item" onclick="window.location.href='food.html'">
                    <div class="icon-box bg-rose-500"><i class="ph ph-hamburger"></i></div>
                    <p class="text-[11px] font-extrabold text-slate-600 mt-2">在地美食</p>
                </div>
                <div class="nav-item" onclick="openModal('itinModal')">
                    <div class="icon-box bg-amber-500"><i class="ph ph-calendar"></i></div>
                    <p class="text-[11px] font-extrabold text-slate-600 mt-2">完美行程</p>
                </div>
                <div class="nav-item" onclick="openModal('checkModal')">
                    <div class="icon-box bg-slate-800"><i class="ph ph-check-square"></i></div>
                    <p class="text-[11px] font-extrabold text-slate-600 mt-2">旅行必備</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals Layer -->
    <div id="modalOverlay"
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-end justify-center">
        <div id="modalContent"
            class="bg-white w-full max-w-lg rounded-t-[40px] p-8 max-h-[85vh] overflow-y-auto animate-in slide-in-from-bottom duration-300 relative">
            <button onclick="closeModal()"
                class="fixed top-auto right-auto ml-[320px] -mt-4 btn-close z-[110] shadow-lg"><i
                    class="ph ph-x text-lg"></i></button>
            <div id="modalDynamicBody" class="pb-10"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const MRT_DATA = [
            { line: "🔵 板南線", stations: ["台北車站", "西門", "忠孝復興", "市政府", "南港展覽館"] },
            { line: "🔴 淡水信義線", stations: ["台北車站", "台北101", "中山", "士林", "北投", "淡水"] },
            { line: "🟢 松山新店線", stations: ["西門", "北門", "南京復興", "松山"] }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            new Swiper(".main-swiper", {
                effect: "coverflow",
                centeredSlides: true,
                slidesPerView: "auto",
                coverflowEffect: { rotate: 0, stretch: 0, depth: 100, modifier: 2, slideShadows: true },
                pagination: { el: ".swiper-pagination", clickable: true }
            });
            updateClock();
            setInterval(updateClock, 1000);
        });

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' });
            document.getElementById('datetime-display').textContent = `Taipei, ${timeStr}`;
        }

        const modalTemplates = {
            airportModal: `
                <h3 class="text-2xl font-black text-slate-800 mb-6">✈️ 機場交通攻略</h3>
                <div class="space-y-4">
                    <div class="p-5 bg-blue-50 rounded-3xl border border-blue-100">
                        <p class="text-blue-600 font-extrabold text-sm mb-1 uppercase tracking-wider">桃園機場 (TPE)</p>
                        <p class="text-slate-700 text-sm leading-relaxed">搭乘「機場捷運」直達台北車站，約 35 分鐘。票價 160 元。</p>
                    </div>
                    <div class="p-5 bg-orange-50 rounded-3xl border border-orange-100">
                        <p class="text-orange-600 font-extrabold text-sm mb-1 uppercase tracking-wider">松山機場 (TSA)</p>
                        <p class="text-slate-700 text-sm leading-relaxed">位於台北市區，搭乘捷運文湖線 (棕線) 即可快速抵達。</p>
                    </div>
                </div>
            `,
            mrtModal: `
                <h3 class="text-2xl font-black text-slate-800 mb-6">🚆 捷運智能規劃</h3>
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 ml-2">起點站</label>
                        <select id="mrt-start" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-emerald-500">
                             ${MRT_DATA.map(l => `<optgroup label="${l.line}">${l.stations.map(s => `<option>${s}</option>`)}</optgroup>`).join('')}
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 ml-2">終點站</label>
                        <select id="mrt-end" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-emerald-500">
                             ${MRT_DATA.map(l => `<optgroup label="${l.line}">${l.stations.map(s => `<option>${s}</option>`)}</optgroup>`).join('')}
                        </select>
                    </div>
                    <button class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-200" onclick="calcMrt()">規劃路徑</button>
                    <div id="mrt-result" class="hidden animate-in fade-in zoom-in p-6 bg-slate-50 rounded-3xl border border-slate-100">
                        <p class="text-xs font-bold text-slate-400 mb-1">預估時間</p>
                        <p class="text-2xl font-black text-emerald-600" id="mrt-time">-- 分鐘</p>
                    </div>
                </div>
            `,
            intercityModal: `
                <h3 class="text-2xl font-black text-slate-800 mb-6">🌍 高鐵/台鐵</h3>
                <div class="space-y-3">
                    <a href="https://www.thsrc.com.tw/" target="_blank" class="flex items-center justify-between p-5 bg-indigo-50 rounded-2xl border border-indigo-100">
                        <span class="font-bold text-indigo-700">台灣高鐵 (HSR)</span>
                        <i class="ph ph-arrow-square-out"></i>
                    </a>
                    <a href="https://tip.railway.gov.tw/" target="_blank" class="flex items-center justify-between p-5 bg-slate-50 rounded-2xl border border-slate-200">
                        <span class="font-bold text-slate-700">台灣鐵路 (TRA)</span>
                        <i class="ph ph-arrow-square-out"></i>
                    </a>
                </div>
            `,
            checkModal: `
                <h3 class="text-2xl font-black text-slate-800 mb-6">📝 旅行必備</h3>
                <div class="space-y-3">
                    <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl">
                        <i class="ph ph-check-circle text-emerald-500 text-xl"></i>
                        <span class="font-bold text-slate-700">悠遊卡 / 一卡通 (EasyCard)</span>
                    </div>
                    <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl">
                        <i class="ph ph-check-circle text-emerald-500 text-xl"></i>
                        <span class="font-bold text-slate-700">中華電信 / 遠傳 5G SIM卡</span>
                    </div>
                </div>
            `,
            itinModal: `
                <h3 class="text-2xl font-black text-slate-800 mb-6">🎯 三天二夜完美行程</h3>
                <div class="space-y-4">
                    <div class="border-l-4 border-emerald-500 pl-4">
                        <p class="text-[10px] font-bold text-emerald-600">Day 1 - 城市探索</p>
                        <p class="text-sm font-bold text-slate-800">台北101 → 象山夕陽 → 臨江街夜市</p>
                    </div>
                    <div class="border-l-4 border-blue-500 pl-4">
                        <p class="text-[10px] font-bold text-blue-600">Day 2 - 懷舊之情</p>
                        <p class="text-sm font-bold text-slate-800">九份老街 → 十分放天燈 → 基隆廟口</p>
                    </div>
                </div>
            `
        };

        function openModal(id) {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('modalDynamicBody').innerHTML = modalTemplates[id] || `<div class='p-10 text-center text-slate-400'>開發中...</div>`;
            overlay.classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        function calcMrt() {
            document.getElementById('mrt-result').classList.remove('hidden');
            document.getElementById('mrt-time').textContent = (Math.floor(Math.random() * 20) + 15) + ' 分鐘';
        }

        function openAttraction(key) { showToast(`正在規劃 ${key} 路線...`); }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-slate-800 text-white px-6 py-3 rounded-full text-xs font-bold shadow-2xl animate-in slide-in-from-bottom-5";
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.remove(); }, 2500);
        }
    </script>
</body>

</html>
