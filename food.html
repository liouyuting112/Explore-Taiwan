<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美食探索 | Explore Taiwan Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.35s cubic-bezier(0.4,0,0.2,1); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .tab-btn.active { background-color:#dc2626; color:white; border-color:#dc2626; }
        .tab-btn { transition: all 0.2s; }
        .food-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.1); }
        .food-card { transition: all 0.2s; }
    </style>
</head>
<body class="text-gray-800">

<header class="bg-gradient-to-r from-red-600 to-orange-500 text-white sticky top-0 z-50 shadow-md">
    <div class="container mx-auto px-4 py-4 flex items-center justify-between">
        <h1 class="text-xl md:text-2xl font-bold">🍜 台灣美食探索</h1>
        <a href="index.html" class="inline-flex items-center px-4 py-2 bg-white/20 hover:bg-white/30 text-white text-sm font-bold rounded-full transition-colors">
            🏠 回首頁
        </a>
    </div>
</header>

<!-- Hero -->
<div class="bg-gradient-to-br from-red-50 to-orange-50 py-10 px-4 text-center">
    <h2 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-3">台灣必吃美食指南</h2>
    <p class="text-gray-500 max-w-xl mx-auto">夜市小吃、百年名店、道地料理、台灣之光飲品——一次全收錄</p>
</div>

<!-- Category Tabs -->
<div class="sticky top-[64px] bg-white shadow-sm z-40">
    <div class="container mx-auto px-4 py-3">
        <div class="flex overflow-x-auto scrollbar-hide gap-2">
            <button onclick="filter('all',this)" class="tab-btn active whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">
                🍽️ 全部
            </button>
            <button onclick="filter('nightmarket',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">
                🌃 夜市必吃
            </button>
            <button onclick="filter('restaurant',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">
                🏮 名店餐廳
            </button>
            <button onclick="filter('drink',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">
                🧋 飲品甜點
            </button>
            <button onclick="filter('regional',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">
                📍 各地特色
            </button>
            <button onclick="filter('breakfast',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">
                🌅 台式早餐
            </button>
        </div>
    </div>
</div>

<!-- Night Market Info Banner -->
<div class="container mx-auto px-4 py-6">
    <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex gap-3 items-start">
        <span class="text-2xl">💡</span>
        <div class="text-sm text-amber-800">
            <strong>夜市現金文化：</strong>台灣夜市幾乎全部只收現金，建議隨身攜帶 NT$500-1000 台幣備用。夜市通常傍晚5點後開始熱鬧，週末人潮最多。
        </div>
    </div>
</div>

<!-- Food Grid -->
<div class="container mx-auto px-4 pb-16">
    <div id="food-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
</div>

<!-- Night Markets Section -->
<div class="container mx-auto px-4 pb-16">
    <h3 class="text-2xl font-extrabold text-gray-800 mb-6">🌃 台灣主要夜市一覽</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="nightmarket-list"></div>
</div>

<script>
const FOODS = [
    { cat:'nightmarket', icon:'🌭', name:'士林大香腸 / 大腸包小腸', city:'台北', location:'士林夜市',
      desc:'糯米腸包豬肉香腸，搭配醃菜和蒜頭，一口咬下是絕妙滋味。士林夜市地下美食區的代表小吃。',
      price:'NT$55-70', tips:'士林夜市地下美食城內有多家攤位，劍潭捷運站步行5分鐘', hours:'每日 17:00-24:00', must:true },
    { cat:'nightmarket', icon:'🦪', name:'蚵仔煎', city:'全台', location:'各大夜市',
      desc:'鮮蚵、雞蛋、番薯粉漿煎成，淋上紅色甜辣醬，外酥內嫩。台灣最具代表性的夜市小吃，外國觀光客必吃。',
      price:'NT$60-80', tips:'台南廟口、永康街、基隆廟口的版本各有特色', hours:'各夜市營業時間', must:true },
    { cat:'nightmarket', icon:'🍢', name:'鹽酥雞', city:'全台', location:'各大夜市/路邊攤',
      desc:'台灣的國民炸物！各種食材裹粉油炸，加九層塔提味，撒胡椒鹽，香酥可口，是深夜宵夜的最佳選擇。',
      price:'NT$100-200', tips:'各地皆有知名攤位，台北許記鹽酥雞排隊人龍長', hours:'通常 18:00 後', must:true },
    { cat:'nightmarket', icon:'🧇', name:'蚵仔麵線', city:'全台', location:'廟口/夜市',
      desc:'台灣版快餐！麵線加蚵仔或大腸，勾芡濃稠湯底，淋上烏醋香菜，鮮味十足，是台灣的靈魂食物。',
      price:'NT$50-70', tips:'阿宗麵線（西門町）是台北地標，基隆廟口版本最正宗', hours:'各店不同', must:true },
    { cat:'nightmarket', icon:'🥚', name:'臭豆腐', city:'全台', location:'夜市必見',
      desc:'外表嚇人但香氣迷人！台灣臭豆腐有炸（外酥脆配泡菜）和麻辣湯兩種，是台灣最具話題性的街頭美食。',
      price:'NT$50-80', tips:'初次嘗試建議從炸臭豆腐+泡菜開始，接受度較高', hours:'夜市時間', must:false },
    { cat:'nightmarket', icon:'🍡', name:'豬血糕', city:'台北', location:'士林/饒河夜市',
      desc:'豬血和糯米製成，串在竹籤上沾花生粉和香菜，口感Q彈，台灣最具標誌性的夜市食物之一。',
      price:'NT$30-50', tips:'饒河街夜市入口即有，建議搭配梅醋醬吃', hours:'夜市時間', must:false },
    { cat:'restaurant', icon:'🥟', name:'鼎泰豐 Din Tai Fung', city:'台北/全台', location:'信義/中山/多處',
      desc:'全球知名小籠包名店，米其林肯定。每顆18折精準摺皮，湯汁豐富、皮薄Q彈。排隊等待是必要的旅遊體驗。',
      price:'NT$300-500/人', tips:'建議官網或App取號；信義本店、中山SOGo店最受歡迎', hours:'11:00-21:00（各店不同）', must:true },
    { cat:'restaurant', icon:'🍜', name:'永康牛肉麵', city:'台北', location:'大安區永康街',
      desc:'台灣牛肉麵文化的代表街。紅燒湯底香濃、牛肉軟嫩，搭配Q彈手工麵條。永康街有多家百年老店，各有死忠粉絲。',
      price:'NT$200-350/碗', tips:'平日中午前往可避開排隊；川味、紅燒、清燉各有人愛', hours:'11:00-20:00（各店不同）', must:true },
    { cat:'restaurant', icon:'🥣', name:'阜杭豆漿', city:'台北', location:'善導寺捷運站',
      desc:'台北最著名豆漿店，每日清晨大排長龍。現做厚燒餅、蛋餅、鹹豆漿，搭配濃郁熱豆漿——最正宗的台北早餐體驗。',
      price:'NT$50-150/人', tips:'每日05:30開門，建議7點前抵達；週一公休，二樓還有更多座位', hours:'05:30-12:30（週一公休）', must:true },
    { cat:'restaurant', icon:'🍱', name:'欣葉台菜 Shin Yeh', city:'台北', location:'中山/信義',
      desc:'台灣家常菜的精緻版本。三杯雞、花枝丸、佛跳牆、芋頭米糕——台灣傳統辦桌料理文化的代表餐廳，適合想品嚐正式台灣料理的旅客。',
      price:'NT$500-800/人', tips:'建議事先訂位，晚餐時段通常滿座', hours:'11:30-21:30', must:false },
    { cat:'drink', icon:'🧋', name:'珍珠奶茶 Bubble Tea', city:'全台', location:'各大茶飲店',
      desc:'台灣發明，征服全球的國民飲品！Q彈珍珠配各式茶底，可客製甜度/冰量。到台灣一定要喝道地的珍奶！',
      price:'NT$60-90', tips:'春水堂（台中創始店）、老虎堂（台南）、一芳（多處）都是知名品牌', hours:'各店不同', must:true },
    { cat:'drink', icon:'🫧', name:'仙草凍 / 燒仙草', city:'全台', location:'夜市/街邊小店',
      desc:'台灣特有的消暑飲品。冷的仙草凍加豆類配料（夏天），熱的燒仙草（冬天），是台灣飲食文化的重要一環。',
      price:'NT$35-60', tips:'台北師大夜市、公館商圈有多家老字號', hours:'各店不同', must:false },
    { cat:'drink', icon:'🍵', name:'台灣高山茶', city:'阿里山/梨山/坪林', location:'茶區/茶館',
      desc:'世界頂級烏龍茶產地！阿里山高山烏龍、梨山高冷茶、坪林包種茶、日月潭紅茶，在九份阿妹茶樓喝一杯是旅遊體驗。',
      price:'NT$200-2000/100g', tips:'九份阿妹茶樓低消約NT$250，但景色無敵；茶葉是最受歡迎的伴手禮', hours:'各茶館不同', must:true },
    { cat:'drink', icon:'🍧', name:'芋圓 Taro Balls', city:'九份/全台', location:'九份老街最著名',
      desc:'九份老街著名的Q彈甜品！芋頭、番薯、地瓜等製成的彩色圓子，搭配剉冰或熱湯，九份老街有多家百年老店。',
      price:'NT$60-80', tips:'九份阿柑姨芋圓是最知名品牌，下午茶時段排隊是常態', hours:'九份老街約 10:00-21:00', must:true },
    { cat:'regional', icon:'🍲', name:'台南牛肉湯', city:'台南', location:'全台南到處有',
      desc:'台南獨有的早餐文化！凌晨3點就開始，以溫體牛肉涮入清澈高湯，搭配薑絲和沙茶醬，鮮甜嫩滑無比。必須清晨去，過了就賣完了！',
      price:'NT$100-180/碗', tips:'六千牛肉湯（凌晨開業）、阿裕牛肉涮涮鍋是台南人推薦', hours:'凌晨03:00-上午10:00', must:true },
    { cat:'regional', icon:'🍚', name:'滷肉飯', city:'全台', location:'小吃店普遍',
      desc:'台灣的靈魂料理！肥瘦相間豬肉丁以醬油、五香、冰糖長時間滷製，淋在白飯上，每家店都有獨門配方，簡單卻讓人念念不忘。',
      price:'NT$30-60/碗', tips:'金峰滷肉飯（台北景福宮旁）、武廟滷肉飯（台南）都是傳奇老店', hours:'各店不同', must:true },
    { cat:'regional', icon:'🥐', name:'台中太陽餅', city:'台中', location:'中山路老街',
      desc:'台中百年糕點，酥脆餅皮包裹麥芽糖內餡，甜而不膩。中山路上多家老字號，是從台中出發必帶的伴手禮。',
      price:'NT$150-300/盒（10片）', tips:'太陽堂老店（中山路）、裕珍馨都是知名品牌，可試吃後購買', hours:'09:00-20:00', must:false },
    { cat:'regional', icon:'🍛', name:'台南擔仔麵', city:'台南', location:'國華街/水仙宮市場',
      desc:'台南小吃的靈魂！以蝦頭熬製的橘紅湯底，加上滷蛋、豆芽、肉燥，份量小但滋味濃，是台南「小食文化」最好的代表。',
      price:'NT$50-80/碗', tips:'度小月（中正路）是百年老店；國華街一帶可以連續吃好幾攤', hours:'各店不同', must:true },
    { cat:'breakfast', icon:'🥚', name:'台式早餐店', city:'全台', location:'巷口隨處可見',
      desc:'台灣獨有的早餐文化！蛋餅（薄脆蛋捲）、培根蛋吐司、饅頭夾蛋、鐵板麵，搭配米漿或豆漿。麥當勞不能代替台式早餐店。',
      price:'NT$50-100/人', tips:'巷口早餐店通常 06:00-11:00 後關門，別睡過頭！', hours:'06:00-11:00', must:true },
    { cat:'breakfast', icon:'🥣', name:'鹹豆漿 Savory Soy Milk', city:'台北', location:'永和/中正區',
      desc:'加醋、榨菜、油條的「破花」鹹豆漿，是台灣最特別的早餐文化之一。豆漿遇酸結塊，口感滑嫩，與甜豆漿截然不同。',
      price:'NT$25-40', tips:'永和豆漿（重慶南路）、阜杭豆漿都有供應；24小時豆漿店遍布台北', hours:'全天（24小時店）', must:true },
];

const NIGHT_MARKETS = [
    { name:'士林夜市', city:'台北', mrt:'劍潭站', hours:'17:00–24:00',
      features:'台灣規模最大、最知名的夜市，分美食區和購物區兩部分',
      must:'大香腸、蚵仔煎、雞排' },
    { name:'饒河街觀光夜市', city:'台北', mrt:'松山站 步行5分', hours:'17:00–23:00',
      features:'台北最精緻的觀光夜市，胡椒餅是鎮店招牌',
      must:'胡椒餅、藥燉排骨、臭豆腐' },
    { name:'臨江街夜市（通化夜市）', city:'台北', mrt:'信義安和站', hours:'17:00–01:00',
      features:'台北在地人愛去的傳統夜市，少觀光客，食物更道地',
      must:'蚵仔麵線、大腸包小腸、新鮮水果' },
    { name:'逢甲夜市', city:'台中', mrt:'無（計程車/公車）', hours:'16:00–02:00',
      features:'全台最大夜市（面積計），創意小吃發源地',
      must:'繼光香香雞、草莓芋圓、台中肉圓' },
    { name:'六合夜市', city:'高雄', mrt:'美麗島站 步行5分', hours:'18:00–01:00',
      features:'高雄最著名的觀光夜市，海鮮為主打',
      must:'木瓜牛奶、海鮮粥、台灣串燒' },
    { name:'花園夜市', city:'台南', mrt:'無（計程車）', hours:'週四/六/日 18:00–24:00',
      features:'台南最大夜市，只有週四六日開放',
      must:'蚵仔煎、台南棺材板、現炸天婦羅' },
    { name:'東大門夜市', city:'花蓮', mrt:'無（步行/計程車）', hours:'17:00–01:00',
      features:'花蓮最大夜市，原住民特色美食豐富',
      must:'馬太鞍部落野豬肉、原住民竹筒飯、花蓮薯' },
];

function filter(cat, btn){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const items = cat==='all' ? FOODS : FOODS.filter(f=>f.cat===cat);
    renderFoods(items);
}

function renderFoods(items){
    document.getElementById('food-grid').innerHTML = items.map(f=>`
        <div class="food-card bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col">
            <div class="flex items-center gap-3 mb-3">
                <span class="text-4xl">${f.icon}</span>
                <div>
                    <h3 class="font-bold text-gray-800 text-base leading-tight">${f.name}
                        ${f.must?'<span class="ml-1 px-2 py-0.5 bg-red-100 text-red-600 text-xs font-bold rounded-full">必吃</span>':''}
                    </h3>
                    <p class="text-xs text-gray-400 mt-0.5">📍 ${f.location} · ${f.city}</p>
                </div>
            </div>
            <p class="text-gray-600 text-sm leading-relaxed mb-3 flex-1">${f.desc}</p>
            <div class="bg-amber-50 rounded-xl p-3 text-xs text-amber-800 mb-3">💡 ${f.tips}</div>
            <div class="flex justify-between items-center text-xs">
                <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full font-semibold">💰 ${f.price}</span>
                <span class="text-gray-400">⏰ ${f.hours}</span>
            </div>
        </div>`).join('');
}

function renderNightMarkets(){
    document.getElementById('nightmarket-list').innerHTML = NIGHT_MARKETS.map(m=>`
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <div class="flex justify-between items-start mb-2">
                <h4 class="font-extrabold text-lg text-gray-800">🌃 ${m.name}</h4>
                <span class="text-xs bg-orange-100 text-orange-700 px-2 py-1 rounded-full font-bold">${m.city}</span>
            </div>
            <p class="text-sm text-gray-500 mb-3">${m.features}</p>
            <div class="flex gap-2 flex-wrap text-xs">
                <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded-lg font-semibold">🚇 ${m.mrt}</span>
                <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded-lg font-semibold">⏰ ${m.hours}</span>
            </div>
            <div class="mt-3 pt-3 border-t border-gray-100 text-xs text-gray-500">
                🔥 必吃：<span class="font-semibold text-red-600">${m.must}</span>
            </div>
        </div>`).join('');
}

renderFoods(FOODS);
renderNightMarkets();
</script>
</body>
</html>
