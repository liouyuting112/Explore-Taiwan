<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美食探索 - 探索台灣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f8ff;
            /* 淺藍色背景 */
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom map button color for Busan (Ocean Blue vibe) */
        .btn-nav {
            background-color: #2563eb;
            /* 藍色系 */
        }

        .btn-nav:hover {
            background-color: #1d4ed8;
        }

        /* Naver Map Brand Color */
        .btn-google {
            background-color: #03C75A;
            /* Naver 綠色 */
        }

        .btn-google:hover {
            background-color: #02b351;
        }
    </style>
</head>

                    <script src="https://cdn.tailwindcss.com"></script>
                    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap"
                        rel="stylesheet">
                    <style>
                        body {
                            font-family: 'Noto Sans TC', sans-serif;
                            background-color: #f0f8ff;
                            /* 淺藍色背景 */
                        }

                        .scrollbar-hide::-webkit-scrollbar {
                            display: none;
                        }

                        .scrollbar-hide {
                            -ms-overflow-style: none;
                            scrollbar-width: none;
                        }

                        .fade-in {
                            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                        }

                        @keyframes fadeIn {
                            from {
                                opacity: 0;
                                transform: translateY(15px);
                            }

                            to {
                                opacity: 1;
                                transform: translateY(0);
                            }
                        }

                        /* Custom map button color for Busan (Ocean Blue vibe) */

                <body class="text-gray-800">

                    <!-- Header -->
                    <header class="bg-blue-600 text-white sticky top-0 z-50 shadow-md">
                        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
                            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />

                            </a>
                        </div>
                    </header>

                    <main class="container mx-auto px-4 py-6 max-w-5xl">
                        <!-- Region Selector -->
                        <section class="mb-6">
                            <h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">選擇區域 (Select

                            <div id="region-buttons" class="flex overflow-x-auto gap-2 pb-2 scrollbar-hide">
                                <!-- Region buttons injected by JS -->
                            </div>
                        </section>

                        <!-- Category Selector -->
                        <section class="mb-8 hidden" id="category-section">
                            <h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">選擇類別 (Select
                                Category)</h2>
                            <div id="category-buttons" class="flex flex-wrap gap-2">
                                <!-- Category buttons injected by JS -->
                            </div>
                        </section>

                        <section id="content-area" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4">
                            <!-- Cards injected by JS -->
                            <div class="col-span-full text-center py-12 text-gray-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 opacity-50"

                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"

                            </div>
                        </section>
                    </main>

                    <script>
                        // Initialize App
                        document.addEventListener('DOMContentLoaded', () => {
                            initRegions();
                            initCategories();
                        });

                    </script>
                </body>

                </html>
