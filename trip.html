<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣行程 & 活動推薦 | Explore Taiwan Trips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-btn.active { background-color: #0284c7; color: white; border-color: #0284c7; }
        .trip-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.1); }
        .trip-card { transition: all 0.2s; }
    </style>
</head>
<body class="text-gray-800">

<header class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white sticky top-0 z-50 shadow-md">
    <div class="container mx-auto px-4 py-4 flex items-center justify-between">
        <h1 class="text-xl md:text-2xl font-bold">🗺️ 台灣行程推薦</h1>
        <a href="index.html" class="inline-flex items-center px-4 py-2 bg-white/20 hover:bg-white/30 text-white text-sm font-bold rounded-full transition-colors">
            🏠 回首頁
        </a>
    </div>
</header>

<!-- Hero -->
<div class="bg-gradient-to-br from-blue-50 to-cyan-50 py-10 px-4 text-center">
    <h2 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-3">台灣精選活動與行程</h2>
    <p class="text-gray-500 max-w-xl mx-auto">一日遊、體驗行程、交通套票——用最聰明的方式玩遍台灣</p>
</div>

<!-- Category Tabs -->
<div class="sticky top-[64px] bg-white shadow-sm z-40">
    <div class="container mx-auto px-4 py-3">
        <div class="flex overflow-x-auto scrollbar-hide gap-2">
            <button onclick="filterTrip('all',this)" class="tab-btn active whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">🌟 全部</button>
            <button onclick="filterTrip('pass',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">🎫 通行證 & 套票</button>
            <button onclick="filterTrip('daytrip',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">🚌 一日遊</button>
            <button onclick="filterTrip('experience',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">🎭 特色體驗</button>
            <button onclick="filterTrip('transport',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">🚇 交通 & 網路</button>
            <button onclick="filterTrip('attraction',this)" class="tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm">🗼 景點門票</button>
        </div>
    </div>
</div>

<div class="container mx-auto px-4 py-6">
    <!-- Klook Banner -->
    <div class="bg-gradient-to-r from-orange-500 to-amber-400 rounded-2xl p-5 mb-6 flex gap-4 items-center text-white">
        <span class="text-4xl">🎟️</span>
        <div class="flex-1">
            <h3 class="font-extrabold text-lg">Klook Taiwan — 台灣活動票券平台</h3>
            <p class="text-sm opacity-90 mt-1">提前預訂台灣門票、體驗活動、一日遊行程，享有線上專屬折扣，免去現場排隊購票的麻煩。</p>
        </div>
        <a href="https://www.klook.com/zh-TW/taiwan/" target="_blank" rel="noopener"
           class="bg-white text-orange-600 font-bold text-sm px-5 py-2.5 rounded-full whitespace-nowrap hover:bg-orange-50 transition-colors">
            前往 Klook →
        </a>
    </div>
    <div id="trip-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-16"></div>
</div>

<script>
const TRIPS = [
    { cat:'pass', icon:'🎫', badge:'超值推薦', name:'台北旅遊卡 Taipei Fun Pass', region:'台北',
      desc:'含台北101觀景台、貓空纜車、各大博物館等超過20個景點免費入場。一張卡遊台北，省去逐一購票的麻煩，適合3-5天深度遊台北的旅客。',
      price:'NT$1,200起', duration:'1-5天可選', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'pass', icon:'🚄', badge:'高CP值', name:'台灣高鐵3日/5日券', region:'全台',
      desc:'外籍旅客限定！持護照購買，可在效期內無限次搭乘台灣高鐵（北高間）。3日券NT$2,180，相當於台北→高雄來回即回本，是南北串遊的最聰明選擇。',
      price:'NT$2,180起', duration:'3天或5天', link:'https://www.klook.com/zh-TW/activity/2847-taiwan-high-speed-rail-pass/' },
    { cat:'pass', icon:'🚇', badge:'交通必備', name:'台北悠遊卡 + 機場捷運1日券', region:'台北',
      desc:'機場捷運1日券含桃園機場到台北市區的來回票，加上悠遊卡不限次搭乘台北捷運，是第一天抵台最划算的套裝組合。',
      price:'NT$350起', duration:'1天', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'daytrip', icon:'🏮', badge:'最熱門', name:'九份&野柳一日遊', region:'台北出發',
      desc:'台灣最受歡迎的一日遊行程！遊覽依山而建的九份老街、野柳地質公園的女王頭奇岩，以及十分放天燈體驗。含專車接送，省去規劃交通的麻煩。',
      price:'NT$1,200起', duration:'約8小時', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'daytrip', icon:'🏔️', badge:'自然必訪', name:'太魯閣一日遊（花蓮出發）', region:'花蓮',
      desc:'走訪台灣最壯麗的自然奇景！遊覽燕子口步道、布洛灣、長春祠，有專業導遊介紹太魯閣地質與原住民文化，含保險和入山申請代辦。',
      price:'NT$800起', duration:'約7小時', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'daytrip', icon:'🌊', badge:'離島特色', name:'小琉球浮潛一日遊', region:'屏東出發',
      desc:'從東港搭船前往小琉球，體驗珊瑚礁浮潛與海龜共游。含船票、浮潛設備、教練指導，是台灣最輕鬆的海洋體驗之一，全年皆可成行。',
      price:'NT$1,500起', duration:'全天', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'daytrip', icon:'🌲', badge:'高山體驗', name:'阿里山森林鐵路&日出一日遊', region:'嘉義出發',
      desc:'搭乘百年森林小火車穿梭神木林，清晨觀賞日出雲海，春天賞吉野櫻花。含往返交通、入園門票，以及導遊帶領的神木步道健行。',
      price:'NT$2,000起', duration:'全天（需清晨出發）', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'experience', icon:'🍜', badge:'美食必做', name:'台北夜市美食小吃導覽', region:'台北',
      desc:'跟隨在地導遊深入士林或饒河夜市，品嚐大香腸、蚵仔煎、珍珠奶茶等10種以上台灣道地小吃，了解每道小吃背後的台灣文化故事。',
      price:'NT$800起', duration:'約3小時', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'experience', icon:'🎋', badge:'文化體驗', name:'原住民文化體驗（烏來/花蓮）', region:'台北/花蓮',
      desc:'親身體驗台灣原住民族文化，包含傳統歌舞表演、手工藝教學（月桃編織、箭竹料理）、部落導覽，以及原住民特色餐飲，認識台灣最深層的文化根源。',
      price:'NT$1,200起', duration:'約4小時', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'experience', icon:'🧋', badge:'台灣之光', name:'珍珠奶茶 DIY 製作體驗', region:'台北/台中',
      desc:'親手製作台灣發明的珍珠奶茶！從煮粉圓開始，調配茶底、奶製品和甜度，帶回家的不只是一杯飲品，更是一份珍貴的台灣記憶。',
      price:'NT$600起', duration:'約1.5小時', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'transport', icon:'📶', badge:'必備上網', name:'台灣5G SIM卡（機場取件）', region:'全台',
      desc:'提早預訂，抵台後在桃園機場領取5G SIM卡，立即啟用上網。中華電信/台灣之星網路穩定覆蓋全台，5天無限量方案是最受歡迎選擇。',
      price:'NT$300起', duration:'3/5/7/10天可選', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'transport', icon:'🚡', badge:'省錢必備', name:'桃園機場捷運1日票', region:'台北',
      desc:'機場捷運1日不限次乘車票，含機場到台北車站的來回，以及沿線各站。特別適合第一天從機場入市區，或最後一天從市區回機場的行程。',
      price:'NT$180起', duration:'1天', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'attraction', icon:'🏙️', badge:'台北地標', name:'台北101 觀景台門票', region:'台北',
      desc:'台北最知名地標，89樓戶外觀景台俯瞰台北盆地360°全景，夜景尤為壯觀。提前線上購票可避免現場排隊，週末需特別提早。',
      price:'NT$600', duration:'彈性', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'attraction', icon:'🚡', badge:'貓空特色', name:'貓空纜車 + 茶園體驗', region:'台北',
      desc:'搭乘台北唯一的空中纜車，俯瞰大台北地區，終點貓空是台北最重要的茶葉產區。喝一杯鐵觀音茶、賞山城夜景，是最台灣的午後消遣。',
      price:'NT$250起', duration:'約半天', link:'https://www.klook.com/zh-TW/taiwan/' },
    { cat:'attraction', icon:'🌙', badge:'湖光山色', name:'日月潭搭船 + 纜車套票', region:'南投',
      desc:'搭環湖遊艇繞湖一圈，造訪玄光寺、伊達邵碼頭，再搭纜車從空中俯瞰日月潭全景，是南投最完整的日月潭體驗組合。',
      price:'NT$560起', duration:'半天~全天', link:'https://www.klook.com/zh-TW/taiwan/' },
];

function filterTrip(cat, btn){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const items = cat==='all' ? TRIPS : TRIPS.filter(t=>t.cat===cat);
    renderTrips(items);
}

function renderTrips(items){
    document.getElementById('trip-grid').innerHTML = items.map(t=>`
        <div class="trip-card bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col">
            <div class="flex items-start gap-3 mb-3">
                <span class="text-4xl">${t.icon}</span>
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <h3 class="font-bold text-gray-800 text-base leading-tight">${t.name}</h3>
                        ${t.badge?`<span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs font-bold rounded-full">${t.badge}</span>`:''}
                    </div>
                    <p class="text-xs text-gray-400 mt-1">📍 ${t.region}</p>
                </div>
            </div>
            <p class="text-gray-600 text-sm leading-relaxed mb-4 flex-1">${t.desc}</p>
            <div class="flex gap-2 flex-wrap text-xs mb-4">
                <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full font-semibold">💰 ${t.price}</span>
                <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full font-semibold">⏱️ ${t.duration}</span>
            </div>
            <a href="${t.link}" target="_blank" rel="noopener"
               class="w-full text-center bg-gradient-to-r from-orange-500 to-amber-400 hover:opacity-90 text-white font-bold py-2.5 px-4 rounded-xl transition-opacity text-sm">
                🎟️ 前往 Klook 查看詳情
            </a>
        </div>`).join('');
}

renderTrips(TRIPS);
</script>
</body>
</html>
